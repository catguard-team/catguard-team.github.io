  <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="11">
    <text x="27.5" y="15" fill="#010101" fill-opacity=".3">자경단</text>
    <text x="27.5" y="14">자경단</text>
    <text x="87.5" y="15" fill="#010101" fill-opacity=".3">MIRROR</text>
