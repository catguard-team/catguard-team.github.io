<!doctype html>
<html lang="ko">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>catguard-team — 고양이 자경단</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font: 16px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #f5f1ea;
      color: #2a2a2a;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #1a1815; color: #e8e3d8; }
      a { color: #b8d4a0; }
    }
    main { max-width: 32rem; padding: 2rem; }
    h1 { font-size: 1.4rem; margin: 0 0 .8rem; letter-spacing: -0.01em; }
    p { margin: .5rem 0; }
    a { color: #6b8e4e; text-decoration: none; border-bottom: 1px dotted; }
    a:hover { border-bottom-style: solid; }
    .sign { margin-top: 2rem; opacity: .6; font-size: .9rem; }
  </style>
</head>
<body>
  <main>
    <h1>catguard-team</h1>
    <p>고양이 자경단의 정적 자산 호스팅. 배지·공용 이미지가 여기 있습니다.</p>
    <p>본진은 <a href="https://github.com/catguard-team">github.com/catguard-team</a>.</p>
    <p>강령은 <a href="https://github.com/catguard-team/manifesto">manifesto</a>.</p>
    <p class="sign">냐-옹.</p>

</html>
